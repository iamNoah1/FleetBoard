name: e2e

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kind-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run e2e smoke test
        run: |
          chmod +x ./scripts/kind-e2e.sh
          ./scripts/kind-e2e.sh
