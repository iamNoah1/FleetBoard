name: release-dashboard

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'dashboard/**'
      - '.github/workflows/release-dashboard.yml'
  pull_request:
    paths:
      - 'dashboard/**'
      - '.github/workflows/release-dashboard.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: fleetboard-dashboard
  COMPONENT_DIR: dashboard
  CHART_PATH: dashboard/helm/fleetboard-dashboard

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        working-directory: .
        run: helm lint ${{ env.CHART_PATH }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.COMPONENT_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        run: helm package ${{ env.CHART_PATH }} --destination /tmp/chart-dist

      - name: Push chart to GHCR OCI
        run: helm push /tmp/chart-dist/*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm
