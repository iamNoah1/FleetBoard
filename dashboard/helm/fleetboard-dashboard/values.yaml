image:
  # Replace with your own registry path, e.g. ghcr.io/your-org/fleetboard-dashboard
  repository: ghcr.io/your-org/fleetboard-dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: fleetboard-dashboard.local
      paths:
        - path: /
          pathType: Prefix

resources: {}

# One entry per cluster name. Keys must match the names listed in `clusters`.
# Each key is exposed as FLEETBOARD_API_KEY_<CLUSTER_UPPER> inside the pod.
# Example:
#   apiKeys:
#     prod: ""
#     eu-west: ""
apiKeys: {}

# Ordered list of cluster names shown as columns in the UI.
# Example:
#   clusters:
#     - prod
#     - eu-west
clusters: []

staleAfterSeconds: 120

# Must stay at 1. The dashboard stores all state in-memory; multiple replicas
# would each hold a different subset of collector data with no synchronisation.
replicaCount: 1

# Optional HTTP Basic Auth for the dashboard UI.
# When enabled, browsers will prompt for credentials before showing the dashboard.
# The /api/ingest endpoint is excluded and remains protected by per-cluster API keys only.
# Auth is disabled when user/password are not set — local development requires no configuration.
auth:
  enabled: false
  # Sensitive — inject via --set, do not store in plain values files.
  basicAuthUser: ""
  basicAuthPassword: ""

# Map of Deployment name → git provider and repository.
# Format per entry: "<deployment-name>: <provider>:<owner>/<repo>"
# Supported providers: github, gitlab, bitbucket
# Example:
#   repoMap:
#     api: "github:myorg/api"
#     worker: "gitlab:myorg/worker"
repoMap: {}

# Optional git tag prefix prepended to the version string to form a tag name.
# If unset, FleetBoard tries "release/{version}", "v{version}", "{version}" in order.
# Example: "release/" to match tags like "release/2.4.1"
tagPrefix: ""

# Git provider authentication tokens.
# Sensitive — inject via --set, do not store in plain values files.
gitProviders:
  github:
    token: ""
  gitlab:
    token: ""
  bitbucket:
    token: ""
    username: ""
