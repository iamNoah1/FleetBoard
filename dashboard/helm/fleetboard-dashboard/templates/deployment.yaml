apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleetboard-dashboard.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fleetboard-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "fleetboard-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: FLEETBOARD_CLUSTERS
              value: "{{ join "," .Values.clusters }}"
            - name: FLEETBOARD_STALE_AFTER_SECONDS
              value: "{{ .Values.staleAfterSeconds }}"
          envFrom:
            - secretRef:
                name: {{ include "fleetboard-dashboard.fullname" . }}-keys
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
