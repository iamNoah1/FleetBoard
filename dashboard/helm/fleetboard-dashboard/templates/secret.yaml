apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleetboard-dashboard.fullname" . }}-keys
type: Opaque
stringData:
  {{- range $cluster, $key := .Values.apiKeys }}
  FLEETBOARD_API_KEY_{{ $cluster | upper }}: {{ $key | quote }}
  {{- end }}
  {{- if .Values.auth.enabled }}
  FLEETBOARD_BASIC_AUTH_USER: {{ .Values.auth.basicAuthUser | quote }}
  FLEETBOARD_BASIC_AUTH_PASSWORD: {{ .Values.auth.basicAuthPassword | quote }}
  {{- end }}
