apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: demo
  labels:
    fleetboard.io/enabled: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: app
          image: nginx:1.27.0
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ignored-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ignored-app
  template:
    metadata:
      labels:
        app: ignored-app
    spec:
      containers:
        - name: app
          image: nginx:1.27.0
          ports:
            - containerPort: 80
